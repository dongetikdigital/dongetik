backend:
  name: github
  repo: dongetikdigital/dongetik   # Ganti dengan repo Anda
  branch: main
  auth_type: implicit              # ← Sveltia mendukung implicit OAuth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "blog"
    label: "Artikel Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Isi Artikel", name: "body", widget: "markdown" }
      - { label: "Gambar Sampul", name: "image", widget: "image", required: false }
