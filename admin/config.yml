backend:
  name: github
  repo: dongetikdigital/dongetik # Sesuai repo Anda
  branch: main
  base_url: https://decap-cms-oauth.onrender.com # Gerbang login otomatis gratis

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Artikel Blog"
    folder: "content/blog"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Artikel", name: "title", widget: "string" }
      - { label: "Tanggal Rilis", name: "date", widget: "datetime" }
      - { label: "Gambar Sampul", name: "thumbnail", widget: "image" }
      - { label: "Deskripsi Singkat", name: "description", widget: "string" }
      - { label: "Isi Artikel", name: "body", widget: "markdown" }
