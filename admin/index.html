<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Content Manager - Dongetik Digital</title>
</head>
<body>

    <div id="nc-root"></div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
        window.addEventListener("message", (event) => {
            if (typeof event.data === "string" && event.data.startsWith("authorization:github:success:")) {
                console.log("Token login diterima!");
                const tokenStr = event.data.replace("authorization:github:success:", "");
                const tokenData = JSON.parse(tokenStr);
                
                // Menyimpan dengan format yang dikenali langsung oleh Decap CMS
                localStorage.setItem("decap-cms-user", JSON.stringify(tokenData));
                localStorage.setItem("netlify-cms-user", JSON.stringify(tokenData));
                
                // Memicu muat ulang halaman agar CMS langsung membaca status login yang baru disimpan
                window.location.reload();
            }
        }, false);
    </script>
</body>
</html>
