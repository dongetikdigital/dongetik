<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Content Manager - Dongetik Digital</title>
</head>
<body>

    <div id="nc-root"></div>

    <script>
        (function() {
            // Ambil hash URL saat ini
            const hash = window.location.hash;
            if (hash && hash.includes("token=")) {
                // Ekstrak token dari URL
                const token = hash.split("token=")[1];
                if (token) {
                    const tokenData = {
                        token: token,
                        provider: 'github'
                    };
                    // Simpan token ke local storage
                    localStorage.setItem("decap-cms-user", JSON.stringify(tokenData));
                    localStorage.setItem("netlify-cms-user", JSON.stringify(tokenData));
                    
                    // Bersihkan parameter token dari URL agar rapi kembali ke /admin/#/
                    window.location.hash = "#/";
                    window.location.reload();
                }
            }
        })();
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
